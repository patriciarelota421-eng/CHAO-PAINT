<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHAO PAINT — Paint Center</title>
    <meta
      name="description"
      content="Chao Paint Center in Sibalom, Antique — quality paints, supplies, and hardware materials with free paint mixing and free delivery within Antique."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&family=Poppins:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --bg:#07101f;
        --panel: rgba(255,255,255,.06);
        --panel2: rgba(255,255,255,.04);
        --text:#eef3fb;
        --muted:#b8c3d6;
        --border:rgba(255,255,255,.10);
        --navy:#07101f;
        --orange:#ff7a18;
        --gold:#f5d06f;
        --gray:#e7ebf2;
        --shadow: 0 18px 45px rgba(0,0,0,.35);
        --radius: 18px;
        --radius2: 12px;
        --focus: 0 0 0 4px rgba(255,122,24,.22);
        --heroPhotoH: 220px;
        --storePhotoH: 190px;
        --productImgH: 160px;
        --thumbW: 64px;
        --thumbH: 44px;
        --chartH: 280px;
        --chartHCompact: 260px;
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        color:var(--text);
        background:
          radial-gradient(1200px 720px at 10% -12%, rgba(255,122,24,.20), transparent 60%),
          radial-gradient(1000px 760px at 92% 0%, rgba(245,208,111,.16), transparent 55%),
          radial-gradient(1200px 900px at 60% 110%, rgba(231,235,242,.08), transparent 62%),
          linear-gradient(180deg, #050b16 0%, #07101f 45%, #050b16 100%);
      }
      a{color:inherit}
      .container{max-width:1140px;margin:0 auto;padding:0 18px}

      .topbar{
        position:sticky;top:0;z-index:50;
        backdrop-filter: blur(10px);
        background: rgba(7,10,15,.62);
        border-bottom:1px solid var(--border);
      }
      .topbarInner{
        display:flex;align-items:center;justify-content:space-between;
        padding:14px 0;
        gap:12px;
      }
      .brand{
        display:flex;align-items:center;gap:10px;
        font-weight:900;letter-spacing:.4px;
      }
      .logo{
        width:34px;height:34px;border-radius:50%;
        background:
          radial-gradient(circle at 30% 30%, rgba(255,255,255,.30), transparent 55%),
          linear-gradient(135deg, var(--gold) 0%, var(--orange) 60%, var(--gray) 130%);
        box-shadow: 0 12px 30px rgba(255,122,24,.18);
        position:relative;
      }
      .logo:after{
        content:"";
        position:absolute;left:12px;top:22px;
        width:10px;height:14px;border-radius:0 0 10px 10px;
        background: rgba(255,255,255,.34);
        transform: rotate(12deg);
        filter: blur(.1px);
      }
      .tag{
        display:inline-flex;align-items:center;gap:8px;
        font-weight:700;
        color:var(--muted);
        border:1px solid var(--border);
        padding:7px 10px;border-radius:999px;
        background: rgba(255,255,255,.03);
        white-space:nowrap;
      }
      .tagDot{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 5px rgba(245,208,111,.12)}

      .nav{display:flex;align-items:center;gap:10px}
      .nav a, .nav button{
        appearance:none;border:1px solid transparent;background:transparent;
        color:var(--muted);
        padding:10px 12px;border-radius:12px;
        font-weight:800;letter-spacing:.2px;
        cursor:pointer;
      }
      .nav a:hover, .nav button:hover{background: rgba(255,255,255,.05); color:var(--text)}
      .nav a.active{
        color:var(--text);
        border-color: rgba(245,208,111,.35);
        background: rgba(245,208,111,.10);
      }
      .hamburger{
        display:none;
        width:42px;height:42px;border-radius:12px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.03);
        color:var(--text);
      }
      .mobileMenu{
        display:none;
        border-top:1px solid var(--border);
        padding:10px 0 14px;
      }
      .mobileMenu a, .mobileMenu button{
        width:100%;
        text-align:left;
        padding:12px 12px;
        border-radius:12px;
        margin:4px 0;
        border:1px solid transparent;
        background:transparent;
        color:var(--muted);
        font-weight:800;
        cursor:pointer;
      }
      .mobileMenu a.active{
        color:var(--text);
        border-color: rgba(245,208,111,.35);
        background: rgba(245,208,111,.10);
      }
      .mobileMenu a:hover, .mobileMenu button:hover{background: rgba(255,255,255,.05); color:var(--text)}

      .banner{
        margin:16px 0 0;
        border:1px solid rgba(245,208,111,.24);
        background:
          linear-gradient(135deg, rgba(255,122,24,.14), rgba(245,208,111,.12), rgba(231,235,242,.06));
        border-radius: var(--radius);
        padding:14px 14px;
        box-shadow: var(--shadow);
        display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
      }
      .banner strong{color:var(--text)}
      .badge{
        display:inline-flex;align-items:center;gap:8px;
        padding:8px 10px;border-radius:999px;
        border:1px solid var(--border);
        background: rgba(0,0,0,.18);
        color:var(--text);
        font-weight:900;
        white-space:nowrap;
      }
      .badge span{opacity:.9}

      .hero{
        padding:36px 0 18px;
        display:grid;
        grid-template-columns: 1.1fr .9fr;
        gap:22px;
        align-items:stretch;
      }
      .heroCard{
        border:1px solid var(--border);
        border-radius: var(--radius);
        background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
        box-shadow: var(--shadow);
        padding:26px;
        position:relative;
        overflow:hidden;
      }
      .heroCard:before{
        content:"";
        position:absolute;inset:-1px;
        background: radial-gradient(700px 320px at 18% 18%, rgba(255,122,24,.18), transparent 65%),
          radial-gradient(540px 300px at 88% 22%, rgba(245,208,111,.16), transparent 60%),
          radial-gradient(680px 420px at 70% 98%, rgba(231,235,242,.10), transparent 62%);
        opacity:.95;
        pointer-events:none;
      }
      .heroCard > *{position:relative}
      .hTitle{
        font-size: clamp(28px, 3.1vw, 44px);
        line-height: 1.05;
        margin:0 0 10px;
        letter-spacing: -.6px;
        font-weight: 900;
        font-family: Poppins, Inter, ui-sans-serif, system-ui;
      }
      .heroPhotoFrame{
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,.12);
        background: rgba(255,255,255,.04);
        box-shadow: 0 18px 45px rgba(0,0,0,.22);
        margin: 0 0 14px;
      }
      .heroPhotoFrame img{
        width:100%;
        height: var(--heroPhotoH);
        object-fit: cover;
        object-position: center;
        display:block;
        padding: 0;
        background: transparent;
      }
      .sectionTitle, .pName{
        font-family: Poppins, Inter, ui-sans-serif, system-ui;
        font-weight: 900;
      }
      .hSub{margin:0 0 18px;color:rgba(231,238,247,.86);font-weight:650;max-width:58ch}
      .ctaRow{display:flex;gap:12px;flex-wrap:wrap}
      .btn{
        appearance:none;border:1px solid transparent;
        background: rgba(255,255,255,.06);
        color:var(--text);
        padding:12px 14px;border-radius:14px;
        font-weight:950;letter-spacing:.2px;
        cursor:pointer;
        box-shadow: 0 10px 24px rgba(0,0,0,.18);
      }
      .btn.primary{
        background: linear-gradient(135deg, var(--orange) 0%, var(--gold) 78%, #ffffff 150%);
        color:#111827;
        border-color: rgba(255,255,255,.22);
      }
      .btn:hover{transform: translateY(-1px)}
      .btn:active{transform: translateY(0px)}
      .btn:focus{outline:none; box-shadow: var(--shadow), var(--focus)}
      .card{
        border:1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(255,255,255,.03);
        box-shadow: var(--shadow);
        padding:18px;
      }
      .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
      .kpi{
        padding:14px;border-radius:14px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.04);
        backdrop-filter: blur(8px);
      }
      .kpi .label{color:var(--muted);font-weight:800;font-size:12px;letter-spacing:.4px;text-transform:uppercase}
      .kpi .value{font-weight:950;font-size:18px;margin-top:6px}
      .kpi .sub{color:rgba(231,238,247,.76);font-weight:700;font-size:12px;margin-top:4px}

      .section{padding:18px 0 28px}
      .sectionTitle{margin:0 0 12px;font-size:22px;font-weight:950;letter-spacing:-.25px}
      .muted{color:var(--muted)}
      .split{
        display:grid;
        grid-template-columns: 1.1fr .9fr;
        gap:18px;
        align-items:start;
      }
      .list{margin:10px 0 0;padding:0;list-style:none;display:grid;gap:10px}
      .li{
        display:flex;gap:10px;align-items:flex-start;
        padding:12px;border-radius:14px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.02);
      }
      .liIcon{
        width:28px;height:28px;border-radius:10px;
        background: rgba(245,208,111,.14);
        border:1px solid rgba(245,208,111,.25);
        display:flex;align-items:center;justify-content:center;
        flex: 0 0 auto;
        font-weight:950;color:rgba(245,208,111,.95);
      }
      .li strong{display:block;margin-bottom:2px}
      .li p{margin:0;color:rgba(231,238,247,.80);font-weight:650}

      .cards{
        display:grid;
        grid-template-columns: repeat(3, minmax(0,1fr));
        gap:14px;
      }
      .pCard{
        padding:16px;border-radius:18px;
        border:1px solid var(--border);
        background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
        box-shadow: var(--shadow);
        display:flex;flex-direction:column;gap:10px;
        min-height: 210px;
      }
      .pTop{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
      .pName{margin:0;font-weight:950;letter-spacing:-.25px}
      .pill{
        display:inline-flex;align-items:center;gap:8px;
        padding:6px 10px;border-radius:999px;
        border:1px solid var(--border);
        background: rgba(0,0,0,.18);
        color: rgba(231,238,247,.86);
        font-weight:850;
        font-size:12px;
        white-space:nowrap;
      }
      .pDesc{margin:0;color:rgba(231,238,247,.78);font-weight:650}
      .pMeta{display:flex;gap:10px;flex-wrap:wrap}
      .price{font-weight:950}
      .stock{color: rgba(184,240,79,.95);font-weight:900}
      .stock.low{color: rgba(255,213,74,.95)}
      .stock.off{color: rgba(255,59,59,.95)}
      .pActions{display:flex;gap:10px;margin-top:auto;flex-wrap:wrap}
      .btn.small{padding:10px 12px;border-radius:12px;font-weight:950}

      .formGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
      label{display:block;font-weight:900;color:rgba(231,238,247,.88);margin-bottom:6px}
      input, select, textarea{
        width:100%;
        padding:12px 12px;
        border-radius: 14px;
        border:1px solid rgba(255,255,255,.14);
        background: rgba(0,0,0,.22);
        color: var(--text);
        font-weight:800;
        outline: none;
      }
      textarea{min-height: 92px; resize: vertical}
      input:focus, select:focus, textarea:focus{box-shadow: var(--focus); border-color: rgba(255,213,74,.38)}
      .help{margin-top:8px;color:rgba(231,238,247,.74);font-weight:650;font-size:12px}

      .cart{
        border:1px solid var(--border);
        background: rgba(255,255,255,.02);
        border-radius: var(--radius);
        padding:16px;
      }
      .cartRow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-top:1px solid rgba(255,255,255,.08)}
      .cartRow:first-child{border-top:none}
      .cartRow .left{display:flex;flex-direction:column;gap:4px}
      .cartRow .name{font-weight:950}
      .cartRow .sub{color:rgba(231,238,247,.72);font-weight:700;font-size:12px}
      .qtyRow{display:flex;align-items:center;gap:8px}
      .qtyBtn{
        width:36px;height:36px;border-radius:12px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.04);
        color:var(--text);
        font-weight:950;
        cursor:pointer;
      }
      .qtyVal{min-width:38px;text-align:center;font-weight:950}

      .tableWrap{overflow:auto;border-radius:var(--radius);border:1px solid var(--border);background: rgba(255,255,255,.02);box-shadow: var(--shadow)}
      table{width:100%;border-collapse:collapse;min-width: 860px}
      th,td{padding:12px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.08);vertical-align:top}
      th{color:rgba(231,238,247,.86);font-weight:950;font-size:12px;letter-spacing:.35px;text-transform:uppercase;background: rgba(0,0,0,.16)}
      td{color:rgba(231,238,247,.86);font-weight:750}
      .tdSmall{color:rgba(231,238,247,.70);font-weight:700;font-size:12px}
      .danger{
        border-color: rgba(255,59,59,.35);
        background: rgba(255,59,59,.10);
      }
      .success{
        border-color: rgba(184,240,79,.35);
        background: rgba(184,240,79,.10);
      }
      .warn{
        border-color: rgba(255,213,74,.35);
        background: rgba(255,213,74,.10);
      }

      .footer{
        padding:22px 0 32px;
        color:rgba(231,238,247,.72);
        font-weight:700;
      }
      .footer a{color:rgba(231,238,247,.84)}
      .floatBtn{
        position:fixed;right:16px;bottom:16px;z-index:60;
        padding:12px 14px;border-radius:999px;
        border:1px solid rgba(255,255,255,.16);
        background: rgba(0,0,0,.35);
        backdrop-filter: blur(8px);
        box-shadow: var(--shadow);
        display:flex;align-items:center;gap:10px;
        color:var(--text);
        font-weight:950;
        cursor:pointer;
      }
      .floatBtn:hover{background: rgba(0,0,0,.48)}
      .tiny{font-size:12px;color:rgba(231,238,247,.70);font-weight:750}

      @media (max-width: 980px){
        .hero{grid-template-columns:1fr}
        .split{grid-template-columns:1fr}
        .cards{grid-template-columns: repeat(2, minmax(0,1fr))}
      }
      @media (max-width: 760px){
        :root{
          --heroPhotoH: 180px;
          --storePhotoH: 160px;
          --productImgH: 140px;
          --thumbW: 56px;
          --thumbH: 40px;
          --chartH: 220px;
          --chartHCompact: 210px;
        }
        .container{padding:0 14px}
        .hero{padding:22px 0 12px}
        .heroCard{padding:18px}
        .nav{display:none}
        .hamburger{display:inline-flex;align-items:center;justify-content:center}
        .mobileMenu{display:block}
        .cards{grid-template-columns: 1fr}
        .formGrid{grid-template-columns:1fr}
        table{min-width: 640px}
        .floatBtn{right:12px;bottom:12px}
      }
      @media (max-width: 560px){
        .ctaRow{gap:10px}
        .ctaRow .btn{width:100%; justify-content:center}
        .grid2{grid-template-columns:1fr}
        .kpi{padding:12px}
        .section{padding:14px 0 22px}
        th,td{padding:10px 10px}
        table{min-width: 520px}
      }
      @media (max-width: 420px){
        :root{
          --heroPhotoH: 160px;
          --storePhotoH: 150px;
          --productImgH: 132px;
          --chartH: 200px;
          --chartHCompact: 190px;
        }
        .container{padding:0 12px}
        .heroCard{padding:16px}
        .card{padding:14px}
        .pCard{padding:14px}
        .floatBtn{right:10px;bottom:10px;padding:10px 12px}
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

      function formatMoney(amount) {
        const safe = Number.isFinite(amount) ? amount : 0;
        return (
          CURRENCY +
          safe.toLocaleString("en-PH", {
            minimumFractionDigits: 0,
            maximumFractionDigits: 0,
          })
        );
      }

      function safeJsonParse(value, fallback) {
        try {
          return JSON.parse(value);
        } catch {
          return fallback;
        }
      }

      function useLocalStorageState(key, initialValue) {
        const [state, setState] = useState(() => {
          const raw = localStorage.getItem(key);
          if (raw == null) return initialValue;
          return safeJsonParse(raw, initialValue);
        });
        useEffect(() => {
          localStorage.setItem(key, JSON.stringify(state));
        }, [key, state]);
        return [state, setState];
      }

      function svgToDataUrl(svgString) {
        const svg = String(svgString || "");
        return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
      }

      function getStoredProductImageSrc(productId, productImages, fallbackSvg, product) {
        const src = productImages && productImages[productId];
        if (src && /^data:image\//.test(src)) return src;
        const files = product && Array.isArray(product.imageFiles) ? product.imageFiles : [];
        if (files.length) return files[0];
        return svgToDataUrl(fallbackSvg);
      }

      function uid() {
        // Stable-enough for local usage: timestamp + random
        return (

      function downloadCsv(filename, rows) {
        const esc = (v) => {
          const s = String(v ?? "");
          if (/[,"\n]/.test(s)) return '"' + s.replaceAll('"', '""') + '"';
          return s;
        };
        const csv = rows.map((r) => r.map(esc).join(",")).join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function CartEditor({ cart, setCart, productImages }) {
        const items = useMemo(() => {
          const byId = new Map(PRODUCTS.map((p) => [p.id, p]));
          return Object.values(cart || {})
            .filter((it) => it && it.qty > 0 && byId.has(it.productId))
            .map((it) => {
              const p = byId.get(it.productId);
              const variant = p.variants?.find((v) => v.label === it.variantLabel) || p.variants?.[0];
              const unitPrice = Number.isFinite(it.unitPrice) ? it.unitPrice : (variant?.price ?? 0);
              return { ...it, product: p, variant, unitPrice };
            });
        }, [cart]);

        const subtotal = useMemo(
          () => items.reduce((sum, it) => sum + it.qty * it.unitPrice, 0),
          [items]
        );

        function setItem(productId, patch) {
          setCart((prev) => {
            const next = { ...(prev || {}) };
            const current = next[productId] || { productId, qty: 0 };
            next[productId] = { ...current, ...patch };
            if (!next[productId].qty || next[productId].qty <= 0) delete next[productId];
            return next;
          });
        }

        if (!items.length) {
          return React.createElement(
            "div",

      function Analytics({ orders }) {
        const { ResponsiveContainer, PieChart, Pie, Cell, Tooltip, BarChart, Bar, XAxis, YAxis, CartesianGrid, LineChart, Line, Legend } =
          (window.Recharts || {});

        const hasCharts =
          ResponsiveContainer && PieChart && Pie && Cell && Tooltip && BarChart && Bar && XAxis && YAxis && CartesianGrid && LineChart && Line && Legend;

        const stats = useMemo(() => {
          const totalRevenue = orders.reduce((s, o) => s + (o.totalAmount || 0), 0);
          const now = new Date();
          const ym = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
          const thisMonthRevenue = orders
            .filter((o) => String(o.createdAt || "").slice(0, 7) === ym)
            .reduce((s, o) => s + (o.totalAmount || 0), 0);
          const avgOrderValue = orders.length ? totalRevenue / orders.length : 0;

          const byProduct = new Map();
          const byStatus = new Map();
          const byDay = new Map();
          for (const o of orders) {
            byStatus.set(o.status || "Pending", (byStatus.get(o.status || "Pending") || 0) + 1);
            const day = String(o.createdAt || "").slice(0, 10);
            if (day) byDay.set(day, (byDay.get(day) || 0) + 1);
            for (const it of o.items || []) {
              const key = it.name || it.productId || "Unknown";
              byProduct.set(key, (byProduct.get(key) || 0) + (it.qty || 0));
            }
          }

          const bestSelling = [...byProduct.entries()]
            .sort((a, b) => b[1] - a[1])
            .slice(0, 7)
            .map(([name, qty]) => ({ name, qty }));

          const statusData = ORDER_STATUSES.map((s) => ({
            name: s,
            value: byStatus.get(s) || 0,
          }));

          const dayData = [...byDay.entries()]
            .sort((a, b) => a[0].localeCompare(b[0]))
            .slice(-14)
            .map(([date, orders]) => ({ date, orders }));

          return {
            totalRevenue,
            thisMonthRevenue,
            totalOrders: orders.length,
            avgOrderValue,
            bestSelling,
            statusData,
            dayData,
          };
        }, [orders]);

        const PIE_COLORS = ["#ffd54a", "#ff3b3b", "#b8f04f", "#7ab6ff", "#9f7bff"];

        return React.createElement(
          "div",
          { className: "section" },
          React.createElement("h3", { className: "sectionTitle" }, "Business Analytics"),
          React.createElement(
            "div",
            { className: "grid2" },

      function AdminDashboard({ orders, setOrders, onLogout }) {
        function updateStatus(orderId, status) {
          setOrders((prev) => prev.map((o) => (o.id === orderId ? { ...o, status } : o)));
        }
        function removeOrder(orderId) {
          setOrders((prev) => prev.filter((o) => o.id !== orderId));
        }
        function exportCsv() {
          const rows = [
            [
              "OrderNumber",
              "CreatedAt",
              "CustomerName",
              "Contact",
              "Items",
              "TotalAmount",
              "PaymentMethod",
              "DeliveryAddress",
              "PreferredDeliveryDate",
              "Status",
            ],
            ...orders.map((o) => [
              o.number,
              o.createdAt,
              o.customer?.fullName,
              o.customer?.contact,
              (o.items || [])
                .map((it) => `${it.qty}x ${it.name}${it.variantLabel ? ` (${it.variantLabel})` : ""}`)
                .join(" | "),
              o.totalAmount,
              o.paymentMethod,
              o.customer?.address,
              o.preferredDeliveryDate,
              o.status,
            ]),
          ];
          const stamp = new Date().toISOString().slice(0, 10);
          downloadCsv(`chao-paint-orders-${stamp}.csv`, rows);

                            "tr",
                            { key: o.id },
                            React.createElement(
                              "td",
                              null,
                              React.createElement("div", { style: { fontWeight: 950 } }, o.number),
                              React.createElement("div", { className: "tdSmall" }, "ID: " + o.id.slice(0, 10) + "…")
                            ),
                            React.createElement(
                              "td",
                              null,
                              React.createElement("div", null, new Date(o.createdAt).toLocaleString("en-PH")),
                              React.createElement("div", { className: "tdSmall" }, "Preferred: " + o.preferredDeliveryDate)
                            ),
                            React.createElement(

      function AdminProductImages({ productImages, setProductImages }) {
        function onPick(productId, file) {
          if (!file) return;
          if (!/^image\//.test(file.type)) {
            alert("Please select an image file (JPG/PNG/WebP).");
            return;
          }
          const maxBytes = 2.5 * 1024 * 1024; // keep localStorage reasonable
          if (file.size > maxBytes) {
            alert("Image is too large. Please use an image under ~2.5MB.");
            return;
          }
          const reader = new FileReader();
          reader.onload = () => {
            const dataUrl = String(reader.result || "");
            if (!dataUrl.startsWith("data:image/")) {
              alert("Failed to read image.");
              return;
            }
            setProductImages((prev) => ({ ...(prev || {}), [productId]: dataUrl }));
          };
          reader.readAsDataURL(file);
        }

        function clear(productId) {
          setProductImages((prev) => {
            const next = { ...(prev || {}) };
            delete next[productId];
            return next;
          });
        }

        return React.createElement(
          "div",
          { className: "section" },
          React.createElement("h3", { className: "sectionTitle" }, "Product Pictures"),

            "p",

            "Upload real photos for each product/service. These are saved in this browser (localStorage)."

          React.createElement(
            "div",
            { className: "cards" },
            ...PRODUCTS.map((p) =>
              React.createElement(
                "div",
                { className: "pCard", key: p.id },
                React.createElement("h4", { className: "pName", style: { margin: 0 } }, p.name),
                React.createElement(
                  "div",
                  {
                    style: {
                      borderRadius: 16,
                      overflow: "hidden",
                      border: "1px solid rgba(255,255,255,.10)",
                      background: "rgba(0,0,0,.22)",
                    },
                  },
                  React.createElement("img", {
                    src: getStoredProductImageSrc(p.id, productImages, p.imageSvg, p),
                    alt: p.imageAlt || p.name,
                    style: {
                      width: "100%",
                      height: 160,
                      objectFit: "contain",
                      objectPosition: "center",
                      display: "block",
                      padding: 10,
                      background: "rgba(255,255,255,.06)",
                    },
                  })
                ),
                React.createElement(
                  "div",
                  { className: "pActions" },
                  React.createElement("input", {
                    type: "file",
                    accept: "image/*",
                    onChange: (e) => onPick(p.id, e.target.files && e.target.files[0]),
                    style: { width: "100%" },
                  }),
                  React.createElement(
                    "button",
                    { className: "btn small", onClick: () => clear(p.id) },
                    "Remove"
                  )
                ),
                React.createElement(
                  "div",
                  { className: "help" },
                  "Recommended: square photo, JPG/WebP under ~2.5MB."
                )
              )
            )
          )
        );
      }

      function App() {
        const [page, setPage] = useState("home");
        const [mobileOpen, setMobileOpen] = useState(false);
        const [orders, setOrders] = useLocalStorageState("chaoPaint.orders.v1", []);
        const [cart, setCart] = useLocalStorageState("chaoPaint.cart.v1", {});
        const [productImages, setProductImages] = useLocalStorageState("chaoPaint.productImages.v1", {});
        const [adminAuthed, setAdminAuthed] = useLocalStorageState("chaoPaint.adminAuthed.v1", false);
        const [lastOrderId, setLastOrderId] = useState(null);

        const lastOrder = useMemo(() => {
          if (!lastOrderId) return null;
          return orders.find((o) => o.id === lastOrderId) || null;
        }, [orders, lastOrderId]);

        function addToCart(productId) {
          const product = PRODUCTS.find((p) => p.id === productId);
          if (!product) return;
          const defaultVariant = product.variants?.[0];
          setCart((prev) => {
            const next = { ...(prev || {}) };
            const current = next[productId] || { productId, qty: 0 };
            next[productId] = {
              ...current,
              qty: (current.qty || 0) + 1,
              variantLabel: current.variantLabel || defaultVariant?.label || "",
              unitPrice:
                Number.isFinite(current.unitPrice) ? current.unitPrice : (defaultVariant?.price ?? 0),
            };
            return next;
          });
        }

        function submitOrder(order) {
          setOrders((prev) => [order, ...(prev || [])]);
          setLastOrderId(order.id);
          setPage("order");
          window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function goAdmin() {
          setLastOrderId(null);
          setPage("admin");
          window.scrollTo({ top: 0, behavior: "smooth" });
        }

        useEffect(() => {
          const onHash = () => {
            const h = (location.hash || "").replace("#", "");
            if (h === "home" || h === "products" || h === "order") setPage(h);
          };
          window.addEventListener("hashchange", onHash);
          onHash();
          return () => window.removeEventListener("hashchange", onHash);
        }, []);

        useEffect(() => {
          // Update hash for simple deep-linking (still "no external routing")
          if (page === "home" || page === "products" || page === "order") location.hash = page;
        }, [page]);

        const content = (() => {
          if (page === "home") return React.createElement(HomePage, { goProducts: () => setPage("products"), goOrder: () => setPage("order") });
          if (page === "products") return React.createElement(ProductsPage, { addToCart: (id) => { addToCart(id); setPage("order"); }, productImages });
          if (page === "order") return React.createElement(OrderPage, { cart, setCart, submitOrder, lastOrder, productImages });
          if (page === "admin") {
            if (!adminAuthed) {
              return React.createElement(AdminLogin, {
                onSuccess: () => setAdminAuthed(true),
                onCancel: () => setPage("home"),
              });
            }
            // allow AdminDashboard's order rows to access images without threading props through table code
            window.__productImages = productImages || {};
            return React.createElement(AdminDashboard, {
              orders,
              setOrders,
              onLogout: () => setAdminAuthed(false),
            });
          }
          return React.createElement("div", { className: "container", style: { padding: "24px 0" } }, "Not found");
        })();

        return React.createElement(
          React.Fragment,
          null,
          React.createElement(TopBar, {
            page,
            setPage,
            isMobileOpen: mobileOpen,
            setMobileOpen: setMobileOpen,
            onAdmin: goAdmin,
          }),
          content,
          page === "admin" && adminAuthed
            ? React.createElement(
                "div",
                { className: "container" },
                React.createElement(AdminProductImages, { productImages, setProductImages })
              )
            : null,
          React.createElement(
            "div",
            { className: "container" },
            React.createElement(
              "div",
              { className: "footer" },
              React.createElement(
                "div",
                null,
                React.createElement("strong", null, BUSINESS.name),
                " — ",
                BUSINESS.type,
                " • ",
                BUSINESS.location
              ),
              React.createElement(
                "div",
                { className: "tiny", style: { marginTop: 6 } },
                "Call/Text: ",
                React.createElement("a", { href: "tel:" + BUSINESS.phone }, BUSINESS.phone),
                " • Email: ",
                React.createElement("a", { href: "mailto:" + BUSINESS.email }, BUSINESS.email),
                " • Facebook: ",
                React.createElement(
                  "a",
                  { href: "https://" + BUSINESS.facebook, target: "_blank", rel: "noopener noreferrer" },
                  BUSINESS.facebook
                )
              ),
              React.createElement(
                "div",
                { className: "tiny", style: { marginTop: 6 } },
                "Payments: ",
                BUSINESS.payments.join(", "),
                " • ",
                BUSINESS.shipping
              )
            )
          )
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(App));
    </script>
